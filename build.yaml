# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano//zmk" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano//zmk
#     shield: reviung41
#   - board: nice_nano//zmk
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  # keyboard: sweep
  - board: nice_nano//zmk
    shield: cradio_left
    snippet: studio-rpc-usb-uart
    #snippet: zmk-usb-logging
    artifact-name: sweep_l
  - board: nice_nano//zmk
    shield: cradio_right
    artifact-name: sweep_r
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: reset
  # keyboard: sweep black
  - board: nice_nano//zmk
    shield: cradio_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"sweep_split_b\"
    artifact-name: sweep_l_b
  # keyboard: sweep black heavy
  - board: nice_nano//zmk
    shield: cradio_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"sweep_split_bh\"
    artifact-name: sweep_l_bh
