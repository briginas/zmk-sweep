    <g transform="translate(80 110)"><use href="#key-normal"/><text class="key-text" x="24" y="21">1</text></g>
    <g transform="translate(132 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">2</text></g>
    <g transform="translate(184 70)"><use href="#key-normal"/><text class="key-text" x="24" y="21">3</text></g>
    <g transform="translate(236 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">4</text></g>
