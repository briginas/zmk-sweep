    <g transform="translate(80 202)"><use href="#key-special"/><text class="key-text-small" x="24" y="21">Tab</text></g>
    <g transform="translate(132 177)"><use href="#key-empty"/></g>
    <g transform="translate(184 162)"><use href="#key-empty"/></g>
    <g transform="translate(236 177)"><use href="#key-empty"/></g>
    <g transform="translate(288 185)"><use href="#key-layer-blue"/><text class="key-text-dark-small" x="24" y="21">Boot</text></g>
    <g transform="translate(484 185)"><use href="#key-empty"/></g>
    <g transform="translate(536 177)"><use href="#key-special"/><text class="key-text-small" x="24" y="21">Bspc</text></g>
    <g transform="translate(588 162)"><use href="#key-normal"/><text class="key-text" x="24" y="21">[</text></g>
    <g transform="translate(640 177)"><use href="#key-normal"/><text class="key-text" x="24" y="21">]</text></g>
    <g transform="translate(692 202)"><use href="#key-normal"/><text class="key-text" x="24" y="21">\</text></g>

    <g transform="translate(258 248) rotate(15 24 21)"><use href="#key-empty"/></g>
    <g transform="translate(314 267) rotate(30 24 21)"><use href="#key-empty"/></g>
    <g transform="translate(458 267) rotate(-30 24 21)"><use href="#key-empty"/></g>
    <g transform="translate(514 248) rotate(-15 24 21)"><use href="#key-layer-blue"/><text class="key-text-dark-small" x="24" y="21">Adjust</text></g>
