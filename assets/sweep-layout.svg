    <rect class="bar-sym" x="305" y="28" width="210" height="30" rx="4" ry="4"/>
    <text class="title-text" x="410" y="43">Symbols</text>
    <text class="note-text" x="410" y="72">Hold left thumb from Base</text>

    <g transform="translate(80 110)"><use href="#key-normal"/><text class="key-text" x="24" y="21">!</text></g>
    <g transform="translate(132 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">@</text></g>
    <g transform="translate(184 70)"><use href="#key-normal"/><text class="key-text" x="24" y="21">#</text></g>
    <g transform="translate(236 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">$</text></g>
    <g transform="translate(288 93)"><use href="#key-normal"/><text class="key-text" x="24" y="21">%</text></g>
    <g transform="translate(484 93)"><use href="#key-empty"/></g>
