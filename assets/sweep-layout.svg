    <rect class="bar-base" x="305" y="28" width="210" height="30" rx="4" ry="4"/>
    <text class="title-text" x="410" y="43">Base</text>
    <text class="note-text" x="410" y="72">QWERTY with balanced home row mods</text>

    <g transform="translate(80 110)"><use href="#key-normal"/><text class="key-text" x="24" y="21">Q</text></g>
    <g transform="translate(132 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">W</text></g>
    <g transform="translate(184 70)"><use href="#key-normal"/><text class="key-text" x="24" y="21">E</text></g>
    <g transform="translate(236 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">R</text></g>
    <g transform="translate(288 93)"><use href="#key-normal"/><text class="key-text" x="24" y="21">T</text></g>
    <g transform="translate(484 93)"><use href="#key-normal"/><text class="key-text" x="24" y="21">Y</text></g>
    <g transform="translate(536 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">U</text></g>
    <g transform="translate(588 70)"><use href="#key-normal"/><text class="key-text" x="24" y="21">I</text></g>
    <g transform="translate(640 85)"><use href="#key-normal"/><text class="key-text" x="24" y="21">O</text></g>
    <g transform="translate(692 110)"><use href="#key-normal"/><text class="key-text" x="24" y="21">P</text></g>

    <g transform="translate(80 156)"><use href="#key-normal"/><text class="key-text" x="24" y="17">A</text><text class="key-sub" x="24" y="30">Sft</text></g>
    <g transform="translate(132 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">S</text><text class="key-sub" x="24" y="30">Ctl</text></g>
    <g transform="translate(184 116)"><use href="#key-normal"/><text class="key-text" x="24" y="17">D</text><text class="key-sub" x="24" y="30">Gui</text></g>
    <g transform="translate(236 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">F</text><text class="key-sub" x="24" y="30">Alt</text></g>
    <g transform="translate(288 139)"><use href="#key-normal"/><text class="key-text" x="24" y="21">G</text></g>
    <g transform="translate(484 139)"><use href="#key-normal"/><text class="key-text" x="24" y="21">H</text></g>
    <g transform="translate(536 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">J</text><text class="key-sub" x="24" y="30">Alt</text></g>
    <g transform="translate(588 116)"><use href="#key-normal"/><text class="key-text" x="24" y="17">K</text><text class="key-sub" x="24" y="30">Gui</text></g>
    <g transform="translate(640 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">L</text><text class="key-sub" x="24" y="30">Ctl</text></g>
    <g transform="translate(692 156)"><use href="#key-normal"/><text class="key-text" x="24" y="17">;</text><text class="key-sub" x="24" y="30">Sft</text></g>

    <g transform="translate(80 202)"><use href="#key-normal"/><text class="key-text" x="24" y="21">Z</text></g>
    <g transform="translate(132 177)"><use href="#key-normal"/><text class="key-text" x="24" y="21">X</text></g>
    <g transform="translate(184 162)"><use href="#key-normal"/><text class="key-text" x="24" y="21">C</text></g>
    <g transform="translate(236 177)"><use href="#key-normal"/><text class="key-text" x="24" y="21">V</text></g>
    <g transform="translate(288 185)"><use href="#key-normal"/><text class="key-text" x="24" y="21">B</text></g>
    <g transform="translate(484 185)"><use href="#key-normal"/><text class="key-text" x="24" y="21">N</text></g>
    <g transform="translate(536 177)"><use href="#key-normal"/><text class="key-text" x="24" y="21">M</text></g>
    <g transform="translate(588 162)"><use href="#key-normal"/><text class="key-text" x="24" y="21">,</text></g>
    <g transform="translate(640 177)"><use href="#key-normal"/><text class="key-text" x="24" y="21">.</text></g>
    <g transform="translate(692 202)"><use href="#key-normal"/><text class="key-text" x="24" y="21">/</text></g>

    <g transform="translate(258 248) rotate(15 24 21)"><use href="#key-layer-red"/><text class="key-text" x="24" y="21">Sym</text></g>
    <g transform="translate(314 267) rotate(30 24 21)"><use href="#key-special"/><text class="key-text-small" x="24" y="21">Space</text></g>
    <g transform="translate(458 267) rotate(-30 24 21)"><use href="#key-special"/><text class="key-text-small" x="24" y="21">Enter</text></g>
    <g transform="translate(514 248) rotate(-15 24 21)"><use href="#key-layer-gold"/><text class="key-text-dark" x="24" y="21">Nav</text></g>

    <text class="combo-text" x="410" y="314">Combos: D+K = Esc | A+; = Caps | E+I = Lang</text>
  </g>

