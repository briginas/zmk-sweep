    <g transform="translate(80 156)"><use href="#key-special"/><text class="key-text" x="24" y="17">Esc</text><text class="key-sub" x="24" y="30">Sft</text></g>
    <g transform="translate(132 131)"><use href="#key-normal"/><text class="key-text-small" x="24" y="21">LCtrl</text></g>
    <g transform="translate(184 116)"><use href="#key-normal"/><text class="key-text-small" x="24" y="21">LGui</text></g>
    <g transform="translate(236 131)"><use href="#key-normal"/><text class="key-text-small" x="24" y="21">LAlt</text></g>
    <g transform="translate(288 139)"><use href="#key-normal"/><text class="key-text" x="24" y="21">^</text></g>
    <g transform="translate(484 139)"><use href="#key-normal"/><text class="key-text" x="24" y="21">-</text></g>
    <g transform="translate(536 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">=</text><text class="key-sub" x="24" y="30">Alt</text></g>
    <g transform="translate(588 116)"><use href="#key-normal"/><text class="key-text" x="24" y="17">{</text><text class="key-sub" x="24" y="30">Gui</text></g>
    <g transform="translate(640 131)"><use href="#key-normal"/><text class="key-text" x="24" y="17">}</text><text class="key-sub" x="24" y="30">Ctl</text></g>
